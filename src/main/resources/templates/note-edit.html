<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Note</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">

<h2 class="mt-3">Edit Note</h2>

<form action="/note/edit" method="post" class="mt-3">

    <input type="hidden" name="id" th:value="${note.id}"/>

    <div class="mb-3">
        <label>Title</label>
        <input type="text" name="title" th:value="${note.title}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Content</label>
        <textarea name="content" class="form-control" th:text="${note.content}"></textarea>
    </div>

    <button type="submit" class="btn btn-success">Save</button>

    <a href="/note/list" class="btn btn-secondary">Back</a>

</form>

</body>
</html>
